<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador - Detalle KPI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .kpi-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .kpi-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .kpi-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(21, 27, 43, 0.8), rgba(15, 21, 34, 0.9));
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.4);
        }

        .stat-card::before {
            content: "";
            position: absolute;
            top: -50px; right: -50px;
            width: 150px; height: 150px;
            background: var(--stat-color);
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            border-radius: 50%;
        }

        .stat-content {
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            color: var(--stat-color);
        }

        /* KPI specific colors */
        .stat-total { --stat-color: #3b82f6; } /* Blue */
        .stat-prev { --stat-color: #10b981; } /* Green */
        .stat-corr { --stat-color: #f59e0b; } /* Amber/Orange */

    </style>
</head>
<body>

    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="grid-layer"></div>
    </div>

    <nav class="navbar">
        <div class="nav-group">
            <ul class="nav-links primary-links">
                <li><a th:href="@{/}">inicio</a></li>
                <li><a th:href="@{/historial}">historial</a></li>
                <li><a th:href="@{/kpi}" class="active">kpi</a></li>
            </ul>
            <ul class="nav-links secondary-links">
                <li><a th:href="@{/equipos}">equipos</a></li>
                <li><a th:href="@{/correctivos}">correctivos</a></li>
            </ul>
        </div>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Cerrar Sesión</button>
        </form>
    </nav>

    <main class="dashboard-container table-container">
        <div class="kpi-container">
            
            <div class="kpi-header">
                <a th:href="@{/kpi}" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <h2 style="font-size: 1.8rem; font-weight: 600; color: var(--text-light); text-shadow: 0 0 10px rgba(255,255,255,0.1);">
                    KPI: <span th:text="${mesFormateado}" style="color: #60a5fa;">Mes Año</span>
                </h2>
            </div>

            <!-- Stats Row -->
            <div class="kpi-stats-grid">
                
                <div class="stat-card stat-prev">
                    <div class="stat-content">
                        <div class="stat-title">Preventivos Realizados</div>
                        <div class="stat-value">
                            <span th:text="${preventivosRealizados}">0</span>
                            <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="stat-card stat-corr">
                    <div class="stat-content">
                        <div class="stat-title">Correctivos Realizados</div>
                        <div class="stat-value">
                            <span th:text="${correctivosRealizados}">0</span>
                            <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="stat-card stat-total">
                    <div class="stat-content">
                        <div class="stat-title">Total Intervenciones</div>
                        <div class="stat-value">
                            <span th:text="${totalRealizados}">0</span>
                            <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Tabla de Equipos Críticos -->
            <div class="table-wrapper" style="margin-top: 1rem;">
                <div class="table-header flex-header" style="margin-bottom: 1.5rem;">
                    <h3 style="font-size: 1.4rem; font-weight: 500; color: #fca5a5;">Equipos Críticos Mantenidos</h3>
                </div>
                
                <div class="table-responsive">
                    <table class="equipos-table">
                        <thead>
                            <tr>
                                <th>Tag</th>
                                <th>Descripción</th>
                                <th>Taller</th>
                                <th>Tipo</th>
                                <th>Criticidad</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="equipo : ${equiposCriticos}">
                                <td class="tag-cell"><span class="tag-badge" th:text="${equipo.tag}" style="border-color: rgba(239, 68, 68, 0.4); color: #fca5a5; background: rgba(239, 68, 68, 0.1);"></span></td>
                                <td class="desc-cell" th:text="${equipo.descripcion}"></td>
                                <td class="taller-cell" th:text="${equipo.tallerNombre}"></td>
                                <td th:text="${equipo.tipo == null ? 'Preventivo' : equipo.tipo}"></td>
                                <td>
                                    <span class="tag-badge badge-critical" th:text="'Crítico (' + ${equipo.criticidad} + ')'"></span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(equiposCriticos)}">
                                <td colspan="5" class="empty-state">No hay equipos críticos realizados en este mes.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
