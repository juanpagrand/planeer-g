<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador - KPI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .history-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            width: 100%;
            margin-top: 1.5rem;
        }
        
        .history-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-light);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.3);
            aspect-ratio: 1;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .history-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(800px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(16, 185, 129, 0.08), transparent 40%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }
        
        .history-card:hover::before {
            opacity: 1;
        }
        
        .history-card:hover {
            transform: translateY(-5px);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5), 0 0 15px rgba(16, 185, 129, 0.15);
        }
        
        .history-card > * {
            position: relative;
            z-index: 1;
        }
        
        .history-icon {
            width: 54px;
            height: 54px;
            margin-bottom: 1.2rem;
            color: #64748b;
            transition: color 0.3s ease, transform 0.3s ease;
        }
        
        .history-card:hover .history-icon {
            color: #10b981;
            transform: translateY(-3px);
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4));
        }
        
        .history-title {
            font-size: 1.15rem;
            font-weight: 500;
            text-transform: capitalize;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
            transition: color 0.3s ease;
        }
        
        .history-card:hover .history-title {
            color: var(--text-light);
        }
        
        .badge-status {
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="grid-layer"></div>
    </div>

    <nav class="navbar">
        <div class="nav-group">
            <ul class="nav-links primary-links">
                <li><a th:href="@{/}">inicio</a></li>
                <li><a th:href="@{/historial}">historial</a></li>
                <li><a th:href="@{/kpi}" class="active">kpi</a></li>
            </ul>
            <ul class="nav-links secondary-links">
                <li><a th:href="@{/equipos}">equipos</a></li>
                <li><a th:href="@{/correctivos}">correctivos</a></li>
            </ul>
        </div>
        
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Cerrar Sesión</button>
        </form>
    </nav>

    <main class="dashboard-container table-container">
        <div class="table-wrapper">
            <div class="table-header flex-header">
                <h2>Indicadores (KPI) Mensuales</h2>
                <div class="header-controls">
                    <div class="search-wrapper">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="searchInput" class="search-input" placeholder="Buscar mes o año...">
                    </div>
                </div>
            </div>
            
            <div class="history-card-grid">
                <!-- Iterar los finalizados -->
                <a th:each="plan : ${planesFinalizados}" th:href="@{/kpi/detalle(id=${plan.id})}" class="history-card history-row">
                    <!-- Icono de KPI (Gráfico de barras minimalista) -->
                    <svg class="history-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    <h3 class="searchable-text history-title" th:text="${__${'plan_' + plan.id}__}">Mes Año</h3>
                    <span class="badge-status">CERRADO</span>
                </a>
                
                <div th:if="${#lists.isEmpty(planesFinalizados)}" style="color: var(--text-muted); padding: 2rem; grid-column: 1 / -1; text-align: center;">
                    No hay KPIs disponibles (ningún mes ha sido finalizado).
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.history-row');
            cards.forEach(card => {
                const textData = card.querySelector('.searchable-text').innerText.toLowerCase();
                card.setAttribute('data-search-cache', textData);
                
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                });
            });
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.history-row');
            
            cards.forEach(card => {
                const cache = card.getAttribute('data-search-cache');
                if (cache && cache.includes(term)) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
